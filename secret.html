<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时光信件 — 大对勾托管中心2026级</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="secret-container">
    <div class="letter-card">
      <h1>📜 时光信件</h1>
      <p style="text-align:center;color:var(--text-muted);margin-bottom:1.5rem;font-size:0.9rem">
        将收到的密文粘贴到下方，点击按钮解开属于你的信
      </p>

      <textarea
        class="letter-textarea"
        id="cipher-input"
        placeholder="在这里粘贴你的密文……"
      ></textarea>

      <button class="letter-btn" id="decrypt-btn">打开我的信 💌</button>

      <div id="result-area"></div>

      <div style="text-align:center">
        <a href="index.html" class="letter-back">← 返回班级主页</a>
      </div>
    </div>
  </div>

  <!-- CryptoJS 本地加载，无需外网 -->
  <script src="js/crypto-js.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/secret.js"></script>
</body>
</html>
