<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空间志 — 班级浮世绘</title>
  <link rel="stylesheet" href="css/ukiyoe.css">

</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-logo"><a href="index.html">🎨 班级浮世绘</a></div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">浮世绘</a></li>
        <li><a href="characters.html">人物</a></li>
        <li><a href="spaces.html" class="active">空间</a></li>
        <li><a href="timeline.html">时间</a></li>
        <li><a href="artifacts.html">风物</a></li>
        <li><a href="../index.html">← 回主站</a></li>
      </ul>
    </div>
  </nav>

  <section class="page-hero">
    <h1>🗺 空间志</h1>
    <p class="section-subtitle">每个角落都有故事。教室的墙会说话，食堂的桌子会记住所有笑声。</p>
  </section>

  <!-- Tabs -->
  <div class="tabs" id="main-tabs">
    <button class="tab-btn active" data-tab="seats">🪑 座位热力图</button>
    <button class="tab-btn" data-tab="hideouts">🕵️ 秘密据点</button>
  </div>

  <!-- Tab 1: 座位热力图 -->
  <section class="section-inner tab-panel active" id="tab-seats" style="padding-top:0">
    <p class="section-subtitle">点击座位看看那里发生过什么故事</p>

    <!-- 讲台标记 -->
    <div style="text-align:center;font-size:0.75rem;color:var(--text-muted);letter-spacing:0.3em;margin-bottom:0.3rem">⬆ 讲 台 ⬆</div>

    <!-- 列分组标签 -->
    <div id="seat-group-labels" style="display:flex;justify-content:center;gap:4px;font-size:0.7rem;color:var(--text-muted);margin-bottom:2px">
      <!-- JS渲染 -->
    </div>

    <div class="seat-map-container">
      <div class="seat-grid" id="seat-grid">
        <!-- JS渲染 -->
      </div>
    </div>

    <!-- 后门标记 -->
    <div style="text-align:center;font-size:0.75rem;color:var(--text-muted);letter-spacing:0.3em;margin-top:0.3rem">⬇ 后 门 ⬇</div>

    <div style="text-align:center;margin-top:0.8rem">
      <div style="display:inline-flex;align-items:center;gap:0.6rem;flex-wrap:wrap;justify-content:center;font-size:0.78rem;color:var(--text-muted)">
        <span>🧊 冷门座位</span>
        <span style="width:80px;height:10px;border-radius:5px;background:linear-gradient(to right, #f0dcc8, #e8a87c, #c75b39, #8b2510)"></span>
        <span>🔥 故事最多 (<span id="heat-legend-max">-</span>)</span>
      </div>
      <div style="margin-top:0.3rem;font-size:0.75rem;color:var(--text-muted)">颜色越深 = 这个座位承载的记忆越多 · 点击格子查看详情和同学名</div>
    </div>

    <!-- 趣味标注图例 -->
    <div style="display:flex;gap:1.5rem;justify-content:center;margin-top:1.2rem;flex-wrap:wrap;font-size:0.82rem">
      <span style="border-bottom:3px dashed #e87c5c">🍪 零食流转路线</span>
      <span style="border-bottom:3px dashed #7b9ec7">📋 纸条传递主干道</span>
      <span style="border-bottom:3px dashed #c7a45b">🚶 班主任巡逻路线</span>
    </div>

    <!-- 座位记忆弹窗 -->
    <div class="modal-overlay" id="seat-modal" style="display:none">
      <div class="modal-content">
        <button class="modal-close" id="seat-modal-close">&times;</button>
        <h3 id="seat-modal-title" style="margin-bottom:0.5rem"></h3>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem" id="seat-modal-location"></p>
        <div id="seat-memories-list" style="margin-bottom:1.5rem"></div>
        <div class="submit-section" style="margin-top:1rem">
          <h4>📝 为这个座位留下记忆</h4>
          <input type="text" id="seat-memory-student" placeholder="谁坐过这里？（名字）" maxlength="10" style="margin-bottom:0.5rem">
          <textarea id="seat-memory-content" placeholder="在这里发生过什么故事？" maxlength="150" style="width:100%;min-height:60px;margin-bottom:0.8rem"></textarea>
          <input type="text" id="seat-memory-author" placeholder="你的名字（选填）" maxlength="10">
          <button class="btn btn-primary btn-sm" id="seat-memory-submit" style="margin-top:0.5rem">提交记忆</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Tab 2: 秘密据点 -->
  <section class="section-inner tab-panel" id="tab-hideouts" style="padding-top:0">
    <p class="section-subtitle">学校里那些只属于我们的"秘密基地"</p>

    <div class="hideout-grid" id="hideout-grid">
      <!-- JS渲染预设 + 用户提交 -->
    </div>

    <!-- 提交新据点 -->
    <div class="submit-section" style="margin-top:3rem">
      <h4>🗺 发现新据点？告诉我们</h4>
      <input type="text" id="new-hideout-name" placeholder="据点名称" maxlength="30">
      <input type="text" id="new-hideout-location" placeholder="具体位置" maxlength="50">
      <textarea id="new-hideout-story" placeholder="这里有什么故事？" maxlength="300" style="width:100%;min-height:80px;margin-bottom:0.8rem"></textarea>
      <input type="text" id="new-hideout-image" placeholder="照片链接（选填）" maxlength="200">
      <button class="btn btn-primary btn-sm" id="new-hideout-submit">提交新据点</button>
    </div>
  </section>

  <footer class="footer">
    <p>🎨 班级浮世绘 · 大对勾托管中心2026级</p>
    <p style="margin-top:0.3rem">空间会变，记忆不会。</p>
  </footer>

  <button class="back-top" id="back-top" aria-label="回到顶部">↑</button>

  <script src="js/config.js"></script>
  <script src="js/lc-init.js"></script>
  <script src="js/main.js"></script>
  <script src="js/spaces.js"></script>
</body>
</html>
